server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 前端静态资源 + SPA 路由
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 反代后端 API
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 60s;
  }
  # 自传音频
  location /media/ {
    proxy_pass http://backend:4000;
  }
}
